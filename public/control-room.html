<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
/* ================================
   🌌 FUTURISTIC DESIGN SYSTEM
================================ */
:root {
    --bg: #0b0d10;
    --surface: rgba(255, 255, 255, 0.05);
    --surface-strong: rgba(255, 255, 255, 0.08);
    --border: rgba(255, 255, 255, 0.14);

    --text: #f5f7fa;
    --muted: #a1a6b0;

    --accent: #6ee7ff;
    --accent-soft: rgba(110, 231, 255, 0.25);

    --radius-lg: 22px;
    --radius-md: 16px;

    --shadow-soft: 0 20px 60px rgba(0, 0, 0, 0.45);
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(1200px 600px at top center, #12151c, #07090c);
    color: var(--text);
}

/* ================= HEADER ================= */
.header {
    padding: 30px 60px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    background: rgba(10,12,16,0.6);
}

.header h1 {
    font-size: 1.8rem;
}

/* ================= MAIN ================= */
.main {
    padding: 60px;
    max-width: 1300px;
    margin: auto;
}

/* ================= BLOG CARD ================= */
.blog-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 25px;
    margin-bottom: 30px;
    box-shadow: var(--shadow-soft);
    transition: 0.3s;
}

.blog-card:hover {
    border-color: var(--accent);
    box-shadow:
        var(--shadow-soft),
        0 0 0 1px rgba(110,231,255,0.3);
}

.blog-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: var(--radius-md);
    margin-bottom: 15px;
}

.blog-card h3 {
    margin-bottom: 10px;
    font-size: 1.4rem;
}

.blog-card p {
    color: var(--muted);
    margin-bottom: 18px;
}

.actions {
    display: flex;
    gap: 12px;
}

.actions button {
    padding: 10px 18px;
    border-radius: 999px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.view-btn {
    background: linear-gradient(135deg, #6ee7ff, #38bdf8);
    color: #000;
}

.delete-btn {
    background: #ef4444;
    color: white;
}

.actions button:hover {
    transform: translateY(-2px);
}

/* ================= EMPTY STATE ================= */
.empty {
    text-align: center;
    color: var(--muted);
    margin-top: 60px;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 768px) {
    .main {
        padding: 30px;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>🚀 Admin Dashboard – Manage Blogs</h1>
</div>

<div class="main">
    <div id="blogList"></div>
</div>

<script>
async function loadBlogs() {
    const res = await fetch("/blogs");
    const blogs = await res.json();

    const container = document.getElementById("blogList");
    container.innerHTML = "";

    if (!blogs.length) {
        container.innerHTML = `<div class="empty">No blogs found.</div>`;
        return;
    }

    blogs.reverse().forEach(blog => {
        const div = document.createElement("div");
        div.className = "blog-card";

        div.innerHTML = `
            ${blog.imageUrl ? `<img src="${blog.imageUrl}">` : ""}
            <h3>${blog.title}</h3>
            <p>${blog.metaDescription}</p>
            <div class="actions">
                <button class="view-btn" onclick="window.open('/blog/${blog.slug}')">View</button>
                <button class="delete-btn" onclick="deleteBlog('${blog.slug}')">Delete</button>
            </div>
        `;

        container.appendChild(div);
    });
}

async function deleteBlog(slug) {
    if (!confirm("Are you sure you want to delete this blog?")) return;

    await fetch("/delete-blog/" + slug, {
        method: "DELETE"
    });

    loadBlogs();
}

loadBlogs();
</script>

</body>
</html>
